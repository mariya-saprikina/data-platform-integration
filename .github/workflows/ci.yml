name: CI — PR Validation

on:
  pull_request:
    branches: [main]

jobs:
  # ==========================================================================
  # Job 1: SQL lint
  # Catches syntax errors in dbt models before they reach the workspace.
  # sqlfluff is configured for Databricks SQL dialect.
  # ==========================================================================
  sql-lint:
    name: SQL Lint (sqlfluff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sqlfluff
        run: pip install sqlfluff

      - name: Lint dbt models
        working-directory: dbt
        run: sqlfluff lint models/

  # ==========================================================================
  # Job 2: Python tests
  # Runs pytest against any Python transformation code.
  # Currently covers the dbt-lint CLI built in sandbox Week 6.
  # Add tests for Phase 2 Python scripts here as they are written.
  # ==========================================================================
  python-tests:
    name: Python Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest

      - name: Run tests
        run: pytest . -v --tb=short || true
        # || true: no tests exist yet — remove once Python tests are written

  # ==========================================================================
  # Job 3: Bundle validation
  # Calls the Databricks workspace API to verify:
  #   - cluster policy IDs referenced in databricks.yml actually exist
  #   - notebook paths resolve correctly
  #   - task dependency graph has no cycles
  #
  # This is the critical gate — it catches workspace config drift before deploy.
  # Runs after lint and tests to avoid burning API calls on broken SQL.
  # ==========================================================================
  bundle-validate:
    name: Bundle Validate (databricks)
    runs-on: ubuntu-latest
    needs: [sql-lint, python-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Validate bundle
        working-directory: bundle
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle validate --target dev
