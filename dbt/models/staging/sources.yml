version: 2

sources:
  - name: raw
    description: "Raw event data landed by Auto Loader into the {env}.raw schema"
    database: "{{ env_var('DBT_CATALOG', 'dev') }}"
    schema: raw
    tables:
      - name: events
        description: "Raw JSON events ingested from S3 landing zone"
        columns:
          - name: event_id
            description: "Unique event identifier"
            tests:
              - not_null
              - unique
          - name: user_id
            description: "User who triggered the event"
            tests:
              - not_null
          - name: event_type
            description: "Type of event"
            tests:
              - not_null
          - name: product_id
            description: "Product referenced by the event"
          - name: amount
            description: "Raw transaction amount string"
            tests:
              - not_null
          - name: ts
            description: "Raw event timestamp string"
            tests:
              - not_null
