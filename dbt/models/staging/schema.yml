models:
  - name: stg_events
    description: "Cleaned and type-cast events from raw source"
    columns:
      - name: event_id
        description: "Unique event identifier"
        tests:
          - not_null
          - unique
      - name: user_id
        description: "User who triggered the event"
        tests:
          - not_null
      - name: event_type
        description: "Type of event: purchase or refund"
        tests:
          - not_null
          - accepted_values:
              values: ['purchase', 'refund']
      - name: amount
        description: "Transaction amount — negative for refunds"
        tests:
          - not_null
      - name: event_at
        description: "Timestamp of the event"
        tests:
          - not_null
