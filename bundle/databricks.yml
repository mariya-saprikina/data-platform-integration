bundle:
  name: data_platform

sync:
  paths:
    - .
    - ../dbt
  exclude:
    - "../dbt/target"
    - "../dbt/logs"
    - "../dbt/dbt_packages"

variables:
  env:
    description: Target environment (dev, staging, prod)
    default: dev

targets:
  dev:
    mode: development
    variables:
      env: dev

  staging:
    variables:
      env: staging

  prod:
    mode: production
    variables:
      env: prod

resources:
  jobs:
    earnings_pipeline:
      name: "earnings_pipeline_${var.env}"

      environments:
        - environment_key: serverless
          spec:
            environment_version: "2"
            dependencies:
             - openai

      tasks:
        # Task 1: ingest raw transcripts data from S3 into dev.raw.transcripts Delta table
        - task_key: ingest_transcripts
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/ingest_transcripts.py
            base_parameters:
              env: ${var.env}
              run_date: ""

        # Task 2: split and label utterances — only starts if ingest_transcripts succeeds
        - task_key: split_and_label
          depends_on:
            - task_key: ingest_transcripts
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/split_and_label.py
            base_parameters:
              env: ${var.env}

        # Task 3: run dbt models — only starts if split_and_label succeeds
        - task_key: run_dbt
          depends_on:
            - task_key: split_and_label
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/run_dbt.py
            base_parameters:
              env: ${var.env}
              dbt_project_path: ${workspace.file_path}/dbt

        # # Task 3: promote staging_wap → marts atomically via INSERT OVERWRITE.
        # # Only runs if run_dbt (dbt run + dbt test) succeeded.
        # # marts is never touched if tests fail.
        # - task_key: audit_and_promote
